<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Premium Crimson Red Background Canvas -->
  <rect width="512" height="512" rx="128" fill="#D32F2F" />
  
  <!-- Sleek, Fast-Forward Matte Black Shadow Block -->
  <path d="M120 340 L392 340 L360 220 L240 220 Z" fill="#111111" />
  
  <!-- Extraordinary Minimalist Car Silhouette (White Lines) -->
  <path d="M100 320 
           C 100 320, 140 310, 180 250 
           C 210 200, 260 160, 340 160 
           C 390 160, 420 200, 430 240 
           L 440 280 
           C 440 300, 420 320, 390 320 
           Z" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="28" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
        
  <!-- Aggressive Red/White Wheel Hub Accents (Simplified for small scale) -->
  <circle cx="180" cy="320" r="32" fill="#111111" stroke="#ffffff" stroke-width="12" />
  <circle cx="360" cy="320" r="32" fill="#111111" stroke="#ffffff" stroke-width="12" />
</svg>
